<!doctype html>
<!--
  Neo-brutalist UI preview for LLM Stream Optimizer /admin
  Standalone preview only — does NOT modify worker.js or any source.
  Switch views with the floating control at bottom-right.
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM Stream Optimizer — UI Preview (Neo-brutalism)</title>
  <style>
    :root {
      --bg: #fef6e4;
      --ink: #0a0a0a;
      --paper: #ffffff;
      --yellow: #ffd23f;
      --pink: #ff5c8a;
      --blue: #4d9de0;
      --green: #7ae582;
      --muted: #6b6357;
      --bw: 3px;            /* border width */
      --shadow: 6px 6px 0 var(--ink);
      --shadow-sm: 4px 4px 0 var(--ink);
      --display: "Arial Black", "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
      --body: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --mono: ui-monospace, "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--body);
      color: var(--ink);
      background-color: var(--bg);
      /* faint dotted grid for texture */
      background-image: radial-gradient(var(--ink) 1px, transparent 1px);
      background-size: 22px 22px;
      background-position: -11px -11px;
      /* keep dots very subtle */
      opacity: 1;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-color: rgba(254, 246, 228, 0.86);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== shared type ===== */
    .display { font-family: var(--display); font-weight: 900; letter-spacing: -0.01em; text-transform: uppercase; }

    /* ===== view switcher (preview only) ===== */
    #switcher {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 50;
      display: flex;
      gap: 8px;
      background: var(--paper);
      border: var(--bw) solid var(--ink);
      box-shadow: var(--shadow);
      padding: 8px;
    }
    #switcher button {
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      font-size: 12px;
      border: var(--bw) solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      padding: 8px 14px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }
    #switcher button:hover { background: var(--yellow); }
    #switcher button[aria-pressed="true"] { background: var(--ink); color: var(--yellow); box-shadow: none; transform: translate(4px,4px); }

    /* ============================================================
       LOGIN
       ============================================================ */
    #view-login {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }
    .login-card {
      width: min(440px, 100%);
      background: var(--paper);
      border: var(--bw) solid var(--ink);
      box-shadow: var(--shadow);
      padding: 0;
      position: relative;
    }
    .login-head {
      background: var(--ink);
      color: var(--yellow);
      padding: 22px 28px;
      border-bottom: var(--bw) solid var(--ink);
      position: relative;
    }
    .login-head .kicker {
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      color: var(--pink);
      margin: 0 0 6px;
    }
    .login-head h1 {
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin: 0;
      font-size: 28px;
      line-height: 0.98;
    }
    .login-stamp {
      position: absolute;
      top: -16px;
      right: -16px;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: var(--pink);
      border: var(--bw) solid var(--ink);
      box-shadow: var(--shadow-sm);
      display: grid;
      place-items: center;
      transform: rotate(12deg);
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 13px;
      text-align: center;
      line-height: 1;
      color: var(--ink);
    }
    .login-body { padding: 26px 28px 30px; }
    .login-body .lede { margin: 0 0 22px; font-size: 14px; color: var(--muted); }

    /* ===== form primitives (shared by both views) ===== */
    label.lbl {
      display: block;
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 11px;
      margin: 16px 0 8px;
    }
    input.fld, textarea.fld {
      width: 100%;
      font: inherit;
      font-family: var(--mono);
      background: var(--paper);
      border: var(--bw) solid var(--ink);
      padding: 12px;
      box-shadow: var(--shadow-sm);
      border-radius: 0;
      outline: none;
      color: var(--ink);
    }
    input.fld:focus, textarea.fld:focus { background: var(--yellow); box-shadow: 2px 2px 0 var(--ink); transform: translate(2px,2px); }
    textarea.fld { min-height: 150px; resize: vertical; }

    /* buttons */
    .btn {
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 13px;
      border: var(--bw) solid var(--ink);
      box-shadow: var(--shadow-sm);
      padding: 12px 18px;
      cursor: pointer;
      background: var(--paper);
      color: var(--ink);
      border-radius: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { background: var(--yellow); }
    .btn:active { box-shadow: none; transform: translate(4px,4px); }
    .btn--primary { background: var(--pink); color: var(--ink); }
    .btn--primary:hover { background: var(--ink); color: var(--pink); }
    .btn--ghost { box-shadow: none; }
    .btn--ghost:hover { background: var(--green); box-shadow: var(--shadow-sm); }

    .login-actions { display: flex; justify-content: flex-end; margin-top: 22px; }

    /* ============================================================
       DASHBOARD
       ============================================================ */
    #view-dashboard { position: relative; z-index: 1; display: none; }
    #view-dashboard.is-on { display: block; }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      background: var(--ink);
      border-bottom: var(--bw) solid var(--ink);
      padding: 14px 24px;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--yellow);
    }
    .nav-brand .mark {
      width: 28px; height: 28px;
      background: var(--pink);
      border: var(--bw) solid var(--yellow);
      box-shadow: 3px 3px 0 var(--yellow);
    }
    .nav-brand h1 {
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin: 0;
      font-size: 20px;
    }
    .nav-meta {
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 10px;
      color: var(--bg);
      opacity: 0.7;
    }

    .shell { width: min(1080px, calc(100vw - 32px)); margin: 28px auto 80px; display: grid; gap: 26px; }

    /* section card with colored header bar */
    .card { background: var(--paper); border: var(--bw) solid var(--ink); box-shadow: var(--shadow); }
    .card-head {
      border-bottom: var(--bw) solid var(--ink);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: 15px;
    }
    .card-head .num {
      background: var(--ink);
      color: var(--paper);
      padding: 2px 9px;
      font-size: 13px;
    }
    .card-head.is-yellow { background: var(--yellow); }
    .card-head.is-blue { background: var(--blue); }
    .card-head.is-pink { background: var(--pink); }
    .card-head.is-green { background: var(--green); }
    .card-body { padding: 8px 20px 22px; }

    .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 4px 22px; }

    .checks { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 16px; }
    .check {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: var(--bw) solid var(--ink);
      box-shadow: var(--shadow-sm);
      padding: 10px 14px;
      background: var(--paper);
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .check input { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; margin: 0; border: var(--bw) solid var(--ink); background: var(--paper); position: relative; cursor: pointer; }
    .check input:checked { background: var(--green); }
    .check input:checked::after { content: "✕"; position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--display); font-weight: 900; font-size: 14px; color: var(--ink); }
    .check:has(input:checked) { background: var(--yellow); }

    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .status {
      font-family: var(--display);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 12px;
      padding: 8px 12px;
      background: var(--green);
      border: var(--bw) solid var(--ink);
      box-shadow: var(--shadow-sm);
    }

    @media (max-width: 760px) {
      .grid2 { grid-template-columns: 1fr; }
      .nav { padding: 12px 16px; }
      .nav-brand h1 { font-size: 16px; }
      .login-stamp { width: 64px; height: 64px; font-size: 11px; top: -12px; right: -10px; }
    }
  </style>
</head>
<body>

  <!-- =================== LOGIN =================== -->
  <div id="view-login">
    <div class="login-card">
      <div class="login-stamp">ADMIN<br>ONLY</div>
      <div class="login-head">
        <p class="kicker">// Stream Optimizer</p>
        <h1>Control<br>Panel</h1>
      </div>
      <div class="login-body">
        <p class="lede">Restricted area. Authenticate with your proxy key to manage upstreams and stream optimization.</p>
        <label class="lbl" for="pw">Password</label>
        <input class="fld" id="pw" type="password" placeholder="••••••••••••" autocomplete="off">
        <div class="login-actions">
          <button class="btn btn--primary" type="button">Enter ▸</button>
        </div>
      </div>
    </div>
  </div>

  <!-- =================== DASHBOARD =================== -->
  <div id="view-dashboard">
    <div class="nav">
      <div class="nav-brand">
        <span class="mark"></span>
        <h1>LLM Stream Optimizer</h1>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <span class="nav-meta">/admin</span>
        <button class="btn btn--ghost" style="color:var(--yellow);" type="button">Logout</button>
      </div>
    </div>

    <div class="shell">
      <!-- Upstream -->
      <div class="card">
        <div class="card-head is-yellow"><span class="num">01</span> Upstream / OpenAI-compatible</div>
        <div class="card-body">
          <div class="grid2">
            <div>
              <label class="lbl">Default upstream URL</label>
              <input class="fld" type="url" value="https://api.openai.com/v1">
            </div>
            <div>
              <label class="lbl">Default outgoing API key</label>
              <input class="fld" type="password" value="sk-proj-xxxxxxxxxxxxxxxxxxxx">
            </div>
          </div>
          <label class="lbl">OpenAI endpoints JSON</label>
          <textarea class="fld" spellcheck="false">[
  { "name": "main", "url": "https://api.openai.com/v1" }
]</textarea>
        </div>
      </div>

      <!-- Providers -->
      <div class="card">
        <div class="card-head is-blue"><span class="num">02</span> Provider Keys</div>
        <div class="card-body">
          <div class="grid2">
            <div>
              <label class="lbl">Gemini URL</label>
              <input class="fld" type="url" value="https://generativelanguage.googleapis.com">
            </div>
            <div>
              <label class="lbl">Gemini API key</label>
              <input class="fld" type="password" value="AIza••••••••••••••••">
            </div>
            <div>
              <label class="lbl">Anthropic URL</label>
              <input class="fld" type="url" value="https://api.anthropic.com">
            </div>
            <div>
              <label class="lbl">Anthropic API key</label>
              <input class="fld" type="password" value="sk-ant-••••••••••••••">
            </div>
            <div style="grid-column: 1 / -1;">
              <label class="lbl">Proxy / admin API key</label>
              <input class="fld" type="password" value="replace-with-your-key">
            </div>
          </div>
          <div class="checks">
            <label class="check"><input type="checkbox" checked> Gemini native fetch</label>
            <label class="check"><input type="checkbox"> Anthropic native fetch</label>
          </div>
        </div>
      </div>

      <!-- Stream optimizer -->
      <div class="card">
        <div class="card-head is-pink"><span class="num">03</span> Stream Optimizer</div>
        <div class="card-body">
          <label class="lbl">Optimized model whitelist</label>
          <input class="fld" type="text" value="gpt-4o, claude-3-5-sonnet-20241022">
          <div class="actions">
            <span class="status">● Saved</span>
            <button class="btn btn--primary" type="button">Save ▸</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- =================== preview switcher =================== -->
  <div id="switcher" role="tablist" aria-label="Preview view">
    <button type="button" data-view="login" aria-pressed="true">Login</button>
    <button type="button" data-view="dashboard" aria-pressed="false">Dashboard</button>
  </div>

  <script>
    const login = document.getElementById('view-login');
    const dash = document.getElementById('view-dashboard');
    document.querySelectorAll('#switcher button').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = btn.dataset.view;
        const showLogin = v === 'login';
        login.style.display = showLogin ? '' : 'none';
        dash.classList.toggle('is-on', !showLogin);
        document.querySelectorAll('#switcher button').forEach(b => {
          b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
        });
      });
    });
  </script>
</body>
</html>
